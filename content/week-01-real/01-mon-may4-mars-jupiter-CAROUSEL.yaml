template: carousel
slides:
  - template: carousel_hook
    fields:
      badge: "POV"
      pages: "1 / 7"
      headline: |-
        you wanna
        fight your
        boss today.
      subline: It's not you. Mars is squaring Jupiter — here's who gets hit hardest.

  - template: carousel_sign
    fields:
      pages: "2 / 7"
      glyph: "♈"
      sign: aries
      label: "YOUR ENERGY TODAY"
      message: |-
        Stop drafting
        the angry
        email.
      quote: You'll regret it by Wednesday. Move your body instead — gym, walk, scream into a pillow.

  - template: carousel_sign
    fields:
      pages: "3 / 7"
      glyph: "♋"
      sign: cancer
      label: "YOUR ENERGY TODAY"
      message: |-
        That "small"
        argument is
        not small.
      quote: Mars in your sign is making you defensive. Pause before you say it. You can't unsay it.

  - template: carousel_sign
    fields:
      pages: "4 / 7"
      glyph: "♎"
      sign: libra
      label: "YOUR ENERGY TODAY"
      message: |-
        Someone is
        going to test
        your patience.
      quote: Don't fold to keep the peace. Saying "no" today protects six months of your life.

  - template: carousel_sign
    fields:
      pages: "5 / 7"
      glyph: "♑"
      sign: capricorn
      label: "YOUR ENERGY TODAY"
      message: |-
        Work drama
        is about to
        escalate.
      quote: Stay out of it. Your name doesn't need to be in that meeting. Reply tomorrow.

  - template: carousel_sign
    fields:
      pages: "6 / 7"
      glyph: "✦"
      sign: everyone else
      label: "UNIVERSAL ENERGY"
      message: |-
        Don't make
        the big
        decision today.
      quote: Mars□Jupiter inflates impulse. Whatever feels urgent at 3pm will feel insane by Thursday.

  - template: carousel_cta
    fields:
      pages: "7 / 7"
      label: "TAG SOMEONE WHO NEEDS THIS"
      headline: |-
        save this
        before you
        text them.
