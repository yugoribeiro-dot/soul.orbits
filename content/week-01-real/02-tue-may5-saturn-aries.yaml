template: carousel
slides:
  - template: carousel_hook
    fields:
      badge: "READ THIS"
      pages: "1 / 7"
      headline: |-
        Saturn just
        entered
        Aries.
      subline: 4 signs are about to get rebuilt from scratch — for the next 2.5 years.

  - template: carousel_sign
    fields:
      pages: "2 / 7"
      glyph: "♈"
      sign: aries
      label: "FOR THE NEXT 2.5 YEARS"
      message: |-
        Saturn is
        editing your
        identity.
      quote: Whatever you're pretending to be ends. What's real gets stronger. No middle ground.

  - template: carousel_sign
    fields:
      pages: "3 / 7"
      glyph: "♋"
      sign: cancer
      label: "FOR THE NEXT 2.5 YEARS"
      message: |-
        Saturn is
        rewriting
        your career.
      quote: 10th house pressure. The role you hide in is leaving. The one you actually want is asking for proof.

  - template: carousel_sign
    fields:
      pages: "4 / 7"
      glyph: "♎"
      sign: libra
      label: "FOR THE NEXT 2.5 YEARS"
      message: |-
        Saturn is
        editing your
        relationships.
      quote: Every relationship gets honest. Some end. The ones that stay become real for the first time.

  - template: carousel_sign
    fields:
      pages: "5 / 7"
      glyph: "♑"
      sign: capricorn
      label: "FOR THE NEXT 2.5 YEARS"
      message: |-
        Saturn is
        burning your
        comfort zone.
      quote: 4th house. Home, family, foundations. What you built on autopilot now demands your full attention.

  - template: carousel_sign
    fields:
      pages: "6 / 7"
      glyph: "✦"
      sign: everyone else
      label: "UNIVERSAL ENERGY"
      message: |-
        Find Aries
        in your chart.
        That house is
        under construction.
      quote: Saturn in Aries lasts until April 2028. Whatever house Aries rules in your chart is your 2.5-year project.

  - template: carousel_cta
    fields:
      pages: "7 / 7"
      label: "TAG AN ARIES, CANCER, LIBRA, CAPRICORN"
      headline: |-
        save this.
        re-read in
        2028.
