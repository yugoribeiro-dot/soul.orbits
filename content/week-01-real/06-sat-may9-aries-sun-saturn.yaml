template: carousel
slides:
  - template: carousel_hook
    fields:
      badge: "ARIES ONLY"
      pages: "1 / 7"
      headline: |-
        if you're an
        aries, the
        next 2 years
        rebuild you.
      subline: Saturn-on-Sun only happens twice in your life. This is one of them.

  - template: carousel_sign
    fields:
      pages: "2 / 7"
      glyph: "☉"
      sign: aries sun
      label: "WHAT SATURN-ON-SUN MEANS"
      message: |-
        The most
        identity-defining
        transit in your chart.
      quote: It only crosses your Sun twice in a lifetime. Once around 29-30. Again around 58-59. This is one of them.

  - template: carousel_sign
    fields:
      pages: "3 / 7"
      glyph: "☉"
      sign: aries sun
      label: "WHAT IT FEELS LIKE"
      message: |-
        Sudden clarity
        about what
        you're doing.
      quote: The role you outgrew ends. A quieter authority replaces the loud one. People stop arguing with you and start asking you.

  - template: carousel_sign
    fields:
      pages: "4 / 7"
      glyph: "☉"
      sign: aries sun
      label: "THE QUESTION SATURN ASKS"
      message: |-
        Are you
        actually
        the leader?
      quote: Or were you just the loudest voice in the room? Saturn answers that question for you. You can't fake it through this transit.

  - template: carousel_sign
    fields:
      pages: "5 / 7"
      glyph: "☽"
      sign: aries moon / rising
      label: "ALSO HIT (BUT SOFTER)"
      message: |-
        Same edit.
        Different
        room of life.
      quote: Aries Moon = emotional rebuild. Aries Rising = how the world sees you. Same Saturn, different surface.

  - template: carousel_sign
    fields:
      pages: "6 / 7"
      glyph: "✦"
      sign: everyone else
      label: "FIND YOUR ARIES DEGREE"
      message: |-
        Saturn reaches
        it sometime
        before April 2028.
      quote: Whatever house Aries rules in your chart is your edit room. Find the degree, mark the date. That's your transit window.

  - template: carousel_cta
    fields:
      pages: "7 / 7"
      label: "TAG EVERY ARIES YOU KNOW"
      headline: |-
        save this.
        re-read on
        the other side.
