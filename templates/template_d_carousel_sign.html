<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{SIGN}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;900&family=Cormorant+Garamond:ital,wght@0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --plasma-pink: #FF4D8D;
    --electric-violet: #8A4DFF;
    --acid-gold: #FFC857;
    --moonlight: #F5EFE0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body {
    font-family: 'Inter', sans-serif;
    color: var(--moonlight);
    position: relative;
    padding: 80px 80px 70px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background:
      radial-gradient(circle at 80% 15%, rgba(138,77,255,0.45) 0%, transparent 50%),
      radial-gradient(circle at 15% 85%, rgba(255,77,141,0.4) 0%, transparent 50%),
      linear-gradient(170deg, #1a0f3a 0%, #14122B 60%, #2a0f3a 100%);
  }
  body::before {
    content: '';
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(1.5px 1.5px at 88% 14%, rgba(255,255,255,0.6), transparent 50%),
      radial-gradient(1px 1px at 14% 30%, rgba(255,255,255,0.4), transparent 50%),
      radial-gradient(2px 2px at 32% 84%, rgba(255,200,87,0.5), transparent 50%);
  }
  .top { position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: center; }
  .sign-tag {
    display: flex; align-items: center; gap: 18px;
  }
  .sign-glyph {
    font-family: 'Cormorant Garamond', serif;
    font-size: 90px;
    font-weight: 500;
    color: var(--acid-gold);
    line-height: 1;
    text-shadow: 0 0 30px rgba(255,200,87,0.6);
  }
  .sign-name {
    font-family: 'Archivo Black', sans-serif;
    font-size: 64px;
    color: var(--moonlight);
    letter-spacing: -1px;
    text-transform: lowercase;
  }
  .pages {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 3px;
    color: rgba(245,239,224,0.55);
  }
  .middle {
    position: relative; z-index: 2;
    flex: 1; display: flex; flex-direction: column; justify-content: center;
  }
  .label {
    font-family: 'Inter', sans-serif;
    font-size: 18px; font-weight: 900;
    letter-spacing: 5px;
    color: var(--plasma-pink);
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .message {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 78px;
    line-height: 1.08;
    letter-spacing: -1px;
    color: var(--moonlight);
    max-width: 920px;
  }
  .footer-quote {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 36px;
    line-height: 1.25;
    color: var(--acid-gold);
    margin-top: 36px;
    max-width: 880px;
  }
  .bottom { position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: flex-end; }
  .wordmark {
    font-family: 'Archivo Black', sans-serif;
    font-size: 20px;
    letter-spacing: 5px;
    color: rgba(245,239,224,0.6);
    text-transform: lowercase;
  }
  .wordmark .dot { color: var(--plasma-pink); }
  .swipe {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 16px;
    letter-spacing: 3px;
    color: rgba(245,239,224,0.55);
  }
  .swipe .arrow { color: var(--plasma-pink); margin-left: 4px; }
</style>
</head>
<body>
  <div class="top">
    <div class="sign-tag">
      <div class="sign-glyph">{{GLYPH}}</div>
      <div class="sign-name">{{SIGN}}</div>
    </div>
    <div class="pages">{{PAGES}}</div>
  </div>
  <div class="middle">
    <div class="label">{{LABEL}}</div>
    <div class="message">{{MESSAGE}}</div>
    <div class="footer-quote">{{QUOTE}}</div>
  </div>
  <div class="bottom">
    <div class="wordmark">soul<span class="dot">.</span>orbits</div>
    <div class="swipe">keep swiping <span class="arrow">→</span></div>
  </div>
</body>
</html>
