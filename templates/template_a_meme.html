<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{HEADLINE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;900&family=Cormorant+Garamond:ital,wght@1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --deep-cosmos: #14122B;
    --plasma-pink: #FF4D8D;
    --electric-violet: #8A4DFF;
    --acid-gold: #FFC857;
    --moonlight: #F5EFE0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body {
    font-family: 'Inter', sans-serif;
    color: var(--moonlight);
    position: relative;
    padding: 70px 70px 60px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background:
      radial-gradient(circle at 20% 10%, rgba(138,77,255,0.55) 0%, transparent 45%),
      radial-gradient(circle at 85% 25%, rgba(255,77,141,0.55) 0%, transparent 50%),
      radial-gradient(circle at 70% 90%, rgba(255,200,87,0.30) 0%, transparent 45%),
      linear-gradient(160deg, #1a0f3a 0%, #14122B 55%, #2a0f3a 100%);
  }
  body::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1.5px 1.5px at 88% 14%, rgba(255,255,255,0.7), transparent 50%),
      radial-gradient(1px 1px at 14% 30%, rgba(255,255,255,0.5), transparent 50%),
      radial-gradient(1.5px 1.5px at 71% 61%, rgba(255,255,255,0.6), transparent 50%),
      radial-gradient(2px 2px at 32% 84%, rgba(255,200,87,0.7), transparent 50%),
      radial-gradient(1px 1px at 50% 50%, rgba(255,255,255,0.4), transparent 50%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 50% 105%, rgba(255,77,141,0.15) 0%, transparent 50%);
    pointer-events: none;
  }
  .top {
    position: relative; z-index: 2;
    display: flex; justify-content: space-between; align-items: center;
  }
  .pov-badge {
    display: inline-block;
    background: var(--acid-gold);
    color: #14122B;
    font-family: 'Archivo Black', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    padding: 14px 24px 12px;
    border-radius: 999px;
    text-transform: uppercase;
    box-shadow: 0 8px 30px rgba(255,200,87,0.35);
  }
  .save-tag {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 3px;
    color: var(--moonlight);
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.25);
    padding: 12px 20px;
    border-radius: 999px;
    text-transform: uppercase;
    backdrop-filter: blur(6px);
  }
  .save-tag .arrow { color: var(--plasma-pink); margin-right: 6px; }
  .middle {
    position: relative; z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    margin-top: -20px;
  }
  .headline {
    font-family: 'Archivo Black', sans-serif;
    font-size: 128px;
    line-height: 0.95;
    letter-spacing: -3px;
    color: var(--moonlight);
    text-transform: none;
    text-shadow: 0 6px 30px rgba(0,0,0,0.4);
    white-space: pre-line;
  }
  .headline .pop {
    color: var(--acid-gold);
    background: linear-gradient(180deg, var(--acid-gold) 0%, var(--plasma-pink) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 44px;
    line-height: 1.2;
    color: rgba(245,239,224,0.85);
    margin-top: 32px;
    max-width: 880px;
  }
  .bottom {
    position: relative; z-index: 2;
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .glyph-row {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    color: var(--acid-gold);
    letter-spacing: 12px;
    text-shadow: 0 0 20px rgba(255,200,87,0.6);
    opacity: 0.95;
  }
  .wordmark {
    font-family: 'Archivo Black', sans-serif;
    font-size: 22px;
    letter-spacing: 6px;
    color: var(--moonlight);
    text-transform: lowercase;
    opacity: 0.9;
  }
  .wordmark .dot { color: var(--plasma-pink); }
</style>
</head>
<body>
  <div class="top">
    <div class="pov-badge">{{BADGE}}</div>
    <div class="save-tag"><span class="arrow">▼</span> SAVE THIS</div>
  </div>
  <div class="middle">
    <div class="headline">{{HEADLINE}}</div>
    <div class="subline">{{SUBLINE}}</div>
  </div>
  <div class="bottom">
    <div class="glyph-row">{{GLYPH}}</div>
    <div class="wordmark">soul<span class="dot">.</span>orbits</div>
  </div>
</body>
</html>
