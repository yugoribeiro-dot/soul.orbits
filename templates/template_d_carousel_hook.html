<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{HEADLINE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;900&family=Cormorant+Garamond:ital,wght@1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --plasma-pink: #FF4D8D;
    --electric-violet: #8A4DFF;
    --acid-gold: #FFC857;
    --moonlight: #F5EFE0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body {
    font-family: 'Inter', sans-serif;
    color: var(--moonlight);
    position: relative;
    padding: 80px 70px 70px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background:
      radial-gradient(circle at 20% 10%, rgba(138,77,255,0.6) 0%, transparent 45%),
      radial-gradient(circle at 85% 25%, rgba(255,77,141,0.6) 0%, transparent 50%),
      radial-gradient(circle at 70% 95%, rgba(255,200,87,0.35) 0%, transparent 45%),
      linear-gradient(160deg, #1a0f3a 0%, #14122B 55%, #2a0f3a 100%);
  }
  body::before {
    content: '';
    position: absolute; inset: 0; pointer-events: none;
    background-image: url("{{STARFIELD}}");
    background-size: cover;
    background-position: center;
    opacity: 0.95;
  }
  .top { position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: center; }
  .pill {
    display: inline-block;
    background: var(--acid-gold);
    color: #14122B;
    font-family: 'Archivo Black', sans-serif;
    font-size: 24px;
    letter-spacing: 4px;
    padding: 14px 22px 12px;
    border-radius: 999px;
    text-transform: uppercase;
    box-shadow: 0 8px 30px rgba(255,200,87,0.35);
  }
  .swipe {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 3px;
    color: var(--moonlight);
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.25);
    padding: 12px 20px;
    border-radius: 999px;
    text-transform: uppercase;
    backdrop-filter: blur(6px);
  }
  .swipe .arrow { color: var(--plasma-pink); margin-left: 6px; }
  .middle {
    position: relative; z-index: 2;
    flex: 1; display: flex; flex-direction: column; justify-content: center;
  }
  .headline {
    font-family: 'Archivo Black', sans-serif;
    font-size: 150px;
    line-height: 1.0;
    letter-spacing: -3px;
    color: var(--moonlight);
    text-shadow: 0 6px 30px rgba(0,0,0,0.4);
    white-space: pre-line;
  }
  .headline .pop {
    background: linear-gradient(180deg, var(--acid-gold) 0%, var(--plasma-pink) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 44px;
    line-height: 1.2;
    color: rgba(245,239,224,0.85);
    margin-top: 36px;
    max-width: 880px;
  }
  .bottom { position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: flex-end; }
  .wordmark {
    font-family: 'Archivo Black', sans-serif;
    font-size: 22px;
    letter-spacing: 6px;
    color: var(--moonlight);
    text-transform: lowercase;
    opacity: 0.9;
  }
  .wordmark .dot { color: var(--plasma-pink); }
  .pages {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 3px;
    color: rgba(245,239,224,0.55);
  }
</style>
</head>
<body>
  <div class="top">
    <div class="pill">{{BADGE}}</div>
    <div class="swipe">SWIPE <span class="arrow">→</span></div>
  </div>
  <div class="middle">
    <div class="headline">{{HEADLINE}}</div>
    <div class="subline">{{SUBLINE}}</div>
  </div>
  <div class="bottom">
    <div class="wordmark">soul<span class="dot">.</span>orbits</div>
    <div class="pages">{{PAGES}}</div>
  </div>
</body>
</html>
