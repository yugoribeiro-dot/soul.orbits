<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{HEADLINE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --deep-cosmos: #14122B;
    --nebula: #221E45;
    --moonlight: #F5EFE0;
    --old-gold: #D4A574;
    --dusk-violet: #7C6FA8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body {
    background: linear-gradient(180deg, var(--deep-cosmos) 0%, var(--deep-cosmos) 65%, var(--nebula) 100%);
    font-family: 'Inter', sans-serif;
    color: var(--moonlight);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 100px 80px 70px;
  }
  /* faint starfield via radial gradients */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 12% 18%, rgba(245,239,224,0.25), transparent 50%),
      radial-gradient(1px 1px at 87% 22%, rgba(245,239,224,0.18), transparent 50%),
      radial-gradient(1px 1px at 23% 47%, rgba(245,239,224,0.12), transparent 50%),
      radial-gradient(1px 1px at 71% 61%, rgba(245,239,224,0.20), transparent 50%),
      radial-gradient(1px 1px at 38% 78%, rgba(245,239,224,0.10), transparent 50%),
      radial-gradient(2px 2px at 91% 84%, rgba(212,165,116,0.18), transparent 50%),
      radial-gradient(1px 1px at 58% 12%, rgba(245,239,224,0.15), transparent 50%),
      radial-gradient(1px 1px at 8% 88%, rgba(245,239,224,0.12), transparent 50%),
      radial-gradient(1px 1px at 65% 35%, rgba(245,239,224,0.08), transparent 50%),
      radial-gradient(1px 1px at 45% 92%, rgba(245,239,224,0.10), transparent 50%);
    pointer-events: none;
  }
  .label {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--dusk-violet);
    margin-top: 20px;
  }
  .glyph {
    font-family: 'Cormorant Garamond', serif;
    font-size: 180px;
    font-weight: 300;
    color: var(--old-gold);
    line-height: 1;
    margin-top: 110px;
    text-shadow:
      0 0 30px rgba(212,165,116,0.35),
      0 0 60px rgba(212,165,116,0.15);
    position: relative;
    z-index: 1;
  }
  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 78px;
    line-height: 1.15;
    color: var(--moonlight);
    text-align: center;
    margin-top: 130px;
    max-width: 880px;
    position: relative;
    z-index: 1;
  }
  .subline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 38px;
    line-height: 1.4;
    color: rgba(245,239,224,0.8);
    text-align: center;
    margin-top: 56px;
    max-width: 760px;
    position: relative;
    z-index: 1;
  }
  .wordmark {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 22px;
    letter-spacing: 4px;
    color: rgba(212,165,116,0.6);
  }
</style>
</head>
<body>
  <div class="label">{{LABEL}}</div>
  <div class="glyph">{{GLYPH}}</div>
  <div class="headline">{{HEADLINE}}</div>
  <div class="subline">{{SUBLINE}}</div>
  <div class="wordmark">soul.orbits</div>
</body>
</html>
