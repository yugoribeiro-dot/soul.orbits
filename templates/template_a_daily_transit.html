<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{HEADLINE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,700;1,300&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --deep-cosmos: #14122B;
    --nebula: #221E45;
    --moonlight: #F5EFE0;
    --old-gold: #D4A574;
    --dusk-violet: #7C6FA8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body {
    background: linear-gradient(180deg, var(--deep-cosmos) 0%, var(--deep-cosmos) 70%, var(--nebula) 100%);
    font-family: 'Inter', sans-serif;
    color: var(--moonlight);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 90px 80px 70px;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 12% 18%, rgba(245,239,224,0.22), transparent 50%),
      radial-gradient(1px 1px at 87% 22%, rgba(245,239,224,0.16), transparent 50%),
      radial-gradient(1px 1px at 23% 47%, rgba(245,239,224,0.10), transparent 50%),
      radial-gradient(1px 1px at 71% 61%, rgba(245,239,224,0.18), transparent 50%),
      radial-gradient(2px 2px at 91% 84%, rgba(212,165,116,0.18), transparent 50%),
      radial-gradient(1px 1px at 8% 88%, rgba(245,239,224,0.10), transparent 50%);
    pointer-events: none;
  }
  .label {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--dusk-violet);
    margin-top: 20px;
    position: relative;
    z-index: 1;
  }
  .glyph {
    font-family: 'Cormorant Garamond', serif;
    font-size: 200px;
    font-weight: 300;
    color: var(--old-gold);
    line-height: 1;
    margin-top: 80px;
    text-shadow:
      0 0 35px rgba(212,165,116,0.4),
      0 0 70px rgba(212,165,116,0.18);
    position: relative;
    z-index: 1;
    letter-spacing: 4px;
  }
  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 108px;
    line-height: 1.08;
    letter-spacing: -1.5px;
    color: var(--moonlight);
    text-align: center;
    margin-top: 90px;
    max-width: 920px;
    position: relative;
    z-index: 1;
  }
  .subline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 50px;
    line-height: 1.3;
    color: var(--old-gold);
    text-align: center;
    margin-top: 40px;
    max-width: 800px;
    position: relative;
    z-index: 1;
  }
  .wordmark {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 22px;
    letter-spacing: 4px;
    color: rgba(212,165,116,0.55);
  }
</style>
</head>
<body>
  <div class="label">{{LABEL}}</div>
  <div class="glyph">{{GLYPH}}</div>
  <div class="headline">{{HEADLINE}}</div>
  <div class="subline">{{SUBLINE}}</div>
  <div class="wordmark">soul.orbits</div>
</body>
</html>
