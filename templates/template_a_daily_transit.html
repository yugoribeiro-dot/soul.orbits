<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{HEADLINE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,700;1,300;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --deep-cosmos: #14122B;
    --nebula: #221E45;
    --moonlight: #F5EFE0;
    --old-gold: #D4A574;
    --dusk-violet: #7C6FA8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body {
    background: var(--deep-cosmos);
    font-family: 'Inter', sans-serif;
    color: var(--moonlight);
    position: relative;
    padding: 80px 80px 70px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 88% 14%, rgba(245,239,224,0.18), transparent 50%),
      radial-gradient(1px 1px at 14% 30%, rgba(245,239,224,0.10), transparent 50%),
      radial-gradient(1px 1px at 71% 61%, rgba(245,239,224,0.18), transparent 50%),
      radial-gradient(2px 2px at 92% 84%, rgba(212,165,116,0.18), transparent 50%);
    pointer-events: none;
  }
  .top {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .label {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--dusk-violet);
  }
  .glyph-corner {
    font-family: 'Cormorant Garamond', serif;
    font-size: 100px;
    font-weight: 300;
    color: var(--old-gold);
    line-height: 1;
    text-shadow:
      0 0 30px rgba(212,165,116,0.5),
      0 0 60px rgba(212,165,116,0.2);
    letter-spacing: 2px;
    margin-top: -10px;
  }
  .middle {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    margin-top: -60px;
  }
  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 130px;
    line-height: 1.0;
    letter-spacing: -2px;
    color: var(--moonlight);
    text-align: left;
    max-width: 920px;
  }
  .subline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 64px;
    line-height: 1.15;
    color: var(--old-gold);
    margin-top: 36px;
    max-width: 880px;
    text-align: left;
  }
  .bottom {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .read-more {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: lowercase;
    color: rgba(245,239,224,0.55);
  }
  .read-more::before {
    content: '— ';
    color: var(--old-gold);
    margin-right: 6px;
  }
  .wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 22px;
    letter-spacing: 4px;
    color: rgba(212,165,116,0.55);
  }
</style>
</head>
<body>
  <div class="top">
    <div class="label">{{LABEL}}</div>
    <div class="glyph-corner">{{GLYPH}}</div>
  </div>
  <div class="middle">
    <div class="headline">{{HEADLINE}}</div>
    <div class="subline">{{SUBLINE}}</div>
  </div>
  <div class="bottom">
    <div class="read-more">read in caption</div>
    <div class="wordmark">soul.orbits</div>
  </div>
</body>
</html>
