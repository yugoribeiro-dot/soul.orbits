<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{HEADLINE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;900&family=Cormorant+Garamond:ital,wght@1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --plasma-pink: #FF4D8D;
    --electric-violet: #8A4DFF;
    --acid-gold: #FFC857;
    --moonlight: #F5EFE0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body {
    font-family: 'Inter', sans-serif;
    color: var(--moonlight);
    position: relative;
    padding: 80px 70px 70px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background:
      radial-gradient(circle at 50% 50%, rgba(255,77,141,0.5) 0%, transparent 55%),
      radial-gradient(circle at 20% 90%, rgba(138,77,255,0.5) 0%, transparent 50%),
      radial-gradient(circle at 85% 10%, rgba(255,200,87,0.35) 0%, transparent 45%),
      linear-gradient(160deg, #2a0f3a 0%, #14122B 50%, #1a0f3a 100%);
  }
  body::before {
    content: '';
    position: absolute; inset: 0; pointer-events: none;
    background-image: url("{{STARFIELD}}");
    background-size: cover;
    background-position: center;
    opacity: 0.95;
  }
  .top { position: relative; z-index: 2; display: flex; justify-content: flex-end; }
  .pages {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 3px;
    color: rgba(245,239,224,0.55);
  }
  .middle {
    position: relative; z-index: 2;
    flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center;
  }
  .small-label {
    font-family: 'Inter', sans-serif;
    font-size: 20px; font-weight: 900;
    letter-spacing: 6px;
    color: var(--acid-gold);
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  .headline {
    font-family: 'Archivo Black', sans-serif;
    font-size: 110px;
    line-height: 1.0;
    letter-spacing: -2px;
    color: var(--moonlight);
    text-shadow: 0 6px 30px rgba(0,0,0,0.4);
    white-space: pre-line;
    margin-bottom: 48px;
  }
  .actions {
    display: flex; flex-direction: column; gap: 22px; align-items: center;
  }
  .action {
    font-family: 'Archivo Black', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    padding: 22px 42px 20px;
    border-radius: 999px;
    text-transform: uppercase;
  }
  .action.primary {
    background: var(--acid-gold);
    color: #14122B;
    box-shadow: 0 12px 40px rgba(255,200,87,0.4);
  }
  .action.secondary {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.3);
    color: var(--moonlight);
    backdrop-filter: blur(6px);
  }
  .action .icon { margin-right: 10px; }
  .bottom { position: relative; z-index: 2; display: flex; justify-content: center; }
  .handle {
    font-family: 'Archivo Black', sans-serif;
    font-size: 32px;
    letter-spacing: 4px;
    color: var(--moonlight);
    text-transform: lowercase;
  }
  .handle .at { color: var(--plasma-pink); }
  .handle .dot { color: var(--plasma-pink); }
</style>
</head>
<body>
  <div class="top">
    <div class="pages">{{PAGES}}</div>
  </div>
  <div class="middle">
    <div class="small-label">{{LABEL}}</div>
    <div class="headline">{{HEADLINE}}</div>
    <div class="actions">
      <div class="action primary"><span class="icon">⤓</span> SAVE THIS POST</div>
      <div class="action secondary"><span class="icon">↗</span> SHARE WITH A FRIEND</div>
    </div>
  </div>
  <div class="bottom">
    <div class="handle"><span class="at">@</span>soul<span class="dot">.</span>orbits</div>
  </div>
</body>
</html>
